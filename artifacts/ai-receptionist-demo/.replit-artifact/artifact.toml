kind = "video"
previewPath = "/ai-receptionist-demo/"
title = "AI Virtual Receptionist"
version = "1.0.0"
id = "artifacts/ai-receptionist-demo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ai-receptionist-demo/" ]
localPort = 18633

[services.development]
run = "pnpm --filter @workspace/ai-receptionist-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-receptionist-demo", "run", "build" ]
publicDir = "artifacts/ai-receptionist-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18633"
BASE_PATH = "/ai-receptionist-demo/"
